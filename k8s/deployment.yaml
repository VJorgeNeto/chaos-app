apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-app
  labels:
    app: chaos-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chaos-app
  template:
    metadata:
      labels:
        app: chaos-app
      annotations:
        # Útil se você usar Prometheus Operator (ServiceMonitors são melhores, mas isso funciona)
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: chaos-app
        image: seu-registry/chaos-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: chaos-app-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: chaos-app-secrets
              key: database_url
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi" # Facilita o teste de OOMKilled via /load-test/memory-leak
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10